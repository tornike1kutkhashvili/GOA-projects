<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        h1 {
            text-align: center;
        }
        p {
            color: aqua;
            background-color: rgb(6, 6, 57);
        }
    </style>
</head>
<body>
    <!-- 5)HTML ფაილში: დაამატე სათაური (h1) დაამატე ორი პარაგრაფი (p) / გამოიყენე Internal CSS (style თეგის გამოყენებით head-ში) და შეცვალე:
• პარაგრაფის ტექსტის ფერი (color)
• პარაგრაფის ფონური ფერი (background-color)
• heading-ის ტექსტის განლაგება (text-align) -->

    <h1>GOA</h1>
    <p>GOA - ARIS PROGRAMIREBIS AKADEMIA</p>
    <p>GOA - ARIS ASEVE MMA-IS SABRDZOLO XELOVNEBIS AKADEMIA</p>
</body>
</html>
